name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          cmake \
          g++ \
          nlohmann-json3-dev \
          libspdlog-dev \
          libgtest-dev

    - name: Configure
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: build
      run: |
        cmake --build build

    - name: Run Tests
      run: |
        ctest --test-dir build --output-on-failure